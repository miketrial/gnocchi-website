[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# friendly /api/* → functions mapping
[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/usage"
  to = "/.netlify/functions/usage"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/pins"
  to = "/.netlify/functions/pins"
  status = 200

[[redirects]]
  from = "/api/jobs/*"
  to = "/.netlify/functions/jobs/:splat"
  status = 200

[[redirects]]
  from = "/api/watchlist/add"
  to = "/.netlify/functions/add-background"
  status = 200

[[redirects]]
  from = "/api/watchlist/rescan"
  to = "/.netlify/functions/rescan-background"
  status = 200

[[redirects]]
  from = "/api/short/rescan"
  to = "/.netlify/functions/short-rescan-background"
  status = 200

[[redirects]]
  from = "/api/short/watchlist"
  to = "/.netlify/functions/short-watchlist"
  status = 200

# ===== SWING BACKTEST FEATURE (removable as a block — see checklist in
# netlify/lib/short-backtest.mjs) =====
[[redirects]]
  from = "/api/short/backtest"
  to = "/.netlify/functions/short-backtest"
  status = 200

[[redirects]]
  from = "/api/short/backtest-seed"
  to = "/.netlify/functions/short-backtest-seed"
  status = 200
# ===== END SWING BACKTEST FEATURE =====

# ===== QUICK SWING FEATURE (removable as a block — see checklist in
# netlify/lib/quickswing-pipeline.mjs) =====
[[redirects]]
  from = "/api/quickswing/rescan"
  to = "/.netlify/functions/quickswing-rescan-background"
  status = 200

[[redirects]]
  from = "/api/quickswing/watchlist"
  to = "/.netlify/functions/quickswing-watchlist"
  status = 200

[[redirects]]
  from = "/api/quickswing/watchlist/*"
  to = "/.netlify/functions/quickswing-delete/:splat"
  status = 200

[[redirects]]
  from = "/api/quickswing/backtest"
  to = "/.netlify/functions/quickswing-backtest"
  status = 200

[[redirects]]
  from = "/api/quickswing/backtest-seed"
  to = "/.netlify/functions/quickswing-backtest-seed"
  status = 200
# ===== END QUICK SWING FEATURE =====

[[redirects]]
  from = "/api/watchlist"
  to = "/.netlify/functions/watchlist"
  status = 200

[[redirects]]
  from = "/api/watchlist/*"
  to = "/.netlify/functions/watchlist-delete/:splat"
  status = 200

[[redirects]]
  from = "/api/net/*"
  to = "/.netlify/functions/net/:splat"
  status = 200

[[redirects]]
  from = "/api/net"
  to = "/.netlify/functions/net"
  status = 200
