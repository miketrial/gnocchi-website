<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gnocchi</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:#f9f9fa;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      color:#1e2228;
    }
    .card{
      background:#fff;
      border-radius:12px;
      box-shadow:0 2px 16px rgba(0,0,0,.08);
      padding:40px 36px;
      width:100%;
      max-width:320px;
      text-align:center;
    }
    h1{font-size:18px;font-weight:600;letter-spacing:.3px;margin-bottom:6px}
    p{font-size:12px;color:#6b7280;margin-bottom:28px}
    input[type=password]{
      width:100%;
      padding:10px 14px;
      font-size:14px;
      border:1px solid #e0e3e8;
      border-radius:8px;
      outline:none;
      color:#464d57;
      background:#fafafa;
      transition:border-color .15s;
    }
    input[type=password]:focus{border-color:#aab0b8;background:#fff}
    button{
      margin-top:12px;
      width:100%;
      padding:10px;
      font-size:13px;
      font-weight:500;
      background:#464d57;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      transition:opacity .15s;
    }
    button:hover{opacity:.85}
    .error{
      margin-top:12px;
      font-size:11px;
      color:#c0392b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Gnocchi</h1>
    <p>Watchlist dashboard</p>
    <form method="POST" action="/login">
      <input type="password" name="pw" placeholder="Password" autofocus autocomplete="current-password">
      <button type="submit">Enter</button>
    </form>
    <script>
      if(location.search.includes('error=1')){
        const d=document.createElement('div');
        d.className='error';
        d.textContent='Incorrect password';
        document.querySelector('.card').appendChild(d);
      }
    </script>
  </div>
</body>
</html>
